name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Verify Code Formatting (Spotless)
        run: ./mvnw spotless:check

      - name: Run Tests
        run: ./mvnw test

      - name: Build Application
        run: ./mvnw clean package -DskipTests

      # Upload the built jar file as an artifact
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: cinezone-app
          path: target/*.jar
          retention-days: 7
