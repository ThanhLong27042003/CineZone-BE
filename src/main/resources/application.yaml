server:
  port: 8080
  servlet:
    context-path: /cinezone

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/cinezonedb}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
  jpa:
    properties:
      hibernate:
        default_batch_fetch_size: 100
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      ssl:
        enabled: true
  kafka:
    bootstrap-servers: ${KAFKA_URL:localhost:29092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      properties:
        spring.json.add.type.headers: false
    consumer:
      group-id: email-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
        spring.json.value.default.type: com.longtapcode.identity_service.dto.event.BookingConfirmedEvent
    topics:
      booking-confirmed: booking-confirmed
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${GMAIL_USERNAME:}
    password: ${GMAIL_APP_PASSWORD:}
    from: "CineZone Booking <${GMAIL_USERNAME:}>"
    templates:
      path: classpath:/templates/email/
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

jwt:
  signerKey: ${JWT_SIGNER_KEY:}
  validationDuration: 20
  refreshableDuration: 120
  admin_password: ${ADMIN_PASSWORD:}

vnpay:
  pay-url: "https://sandbox.vnpayment.vn/paymentv2/vpcpay.html"
  return-url: "http://localhost:5173/payment/callback"
  tmn-code: ${VNPAY_TMN_CODE:}
  secret-key: ${VNPAY_SECRET_KEY:}

paypal:
  client-id: ${PAYPAL_CLIENT_ID:}
  client-secret: ${PAYPAL_CLIENT_SECRET:}
  mode: "sandbox"
  return-url: "http://localhost:5173/payment/paypal-callback"
  cancel-url: "http://localhost:5173/payment/cancelled"


ai:
  service:
    url: http://localhost:8000
    enabled: true

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
